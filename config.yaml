# Discord GEO bot configuration
# Adding a new country is config-only — no code changes required.

# The primary redirect/router domain.
router_domain: chancer.bet

# ---------------------------------------------------------------------------
# Monitor tuning
# ---------------------------------------------------------------------------
monitor:
  # How often the background monitor runs a full check cycle (minutes).
  interval_minutes: 10
  # Per-attempt HTTP timeout (seconds).
  request_timeout: 30
  # Number of consecutive proxy errors before an ORANGE alert fires.
  proxy_error_threshold: 3
  # How long to wait before re-alerting on an unacknowledged outage (hours).
  realert_after_hours: 4
  # Ignore button pauses alerts for this GEO for this many hours.
  ignore_duration_hours: 1
  # HU-specific: consecutive all-ASN-blocked cycles before alert fires.
  failure_threshold_hu: 6
  # RIPE Atlas credit floor — measurements are skipped when the cached
  # balance falls below this number, so we never silently exhaust credits
  # or starve higher-priority geos. Cached for 60s.
  ripe_credit_floor: 50

# ---------------------------------------------------------------------------
# GEOs
# code:         ISO 3166-1 alpha-2 country code
# name:         Human-readable label shown in Discord
# flag:         Emoji flag
# check_method: how the background monitor tests the mirror in this GEO
#               http — via Decodo residential proxy (real ISP IPs)
#               dns  — via RIPE Atlas probes (detects ISP DNS hijack)
# monitor:      true to include this GEO in the background monitor
#               (set false to keep the GEO available for /check-redirect
#               while it's not yet production-ready for alerting)
#
# For /check-redirect to work, a matching NordVPN server mapping must exist
# in ec2_setup.sh SERVER_MAP. That is independent of `check_method`, which
# governs health-check monitoring only.
# ---------------------------------------------------------------------------
geos:
  - code: HU
    name: Hungary
    flag: "🇭🇺"
    check_method: hu_consensus
    monitor: true
    asns:
      - "5483"    # Magyar Telekom
      - "21334"   # Vodafone Hungary
      - "20845"   # DIGI Telecommunications
      - "213155"  # Yettel (formerly Telenor Hungary)
  - code: GR
    name: Greece
    flag: "🇬🇷"
    check_method: ripe_reliable_asn
    monitor: true
    # Reliable ASN: AS1241 (OTE/Cosmote) — hardcoded in monitor.py
    # Peer ASNs below feed the new-ASN escalation rule
    asns:
      - "1241"    # OTE / Cosmote (reliable)
      - "6799"    # Forthnet / Nova
      - "3329"    # Vodafone Greece
      - "25472"   # Wind Hellas
  - code: PL
    name: Poland
    flag: "🇵🇱"
    check_method: ripe_reliable_asn
    monitor: true
    # Reliable ASN: AS5617 (Orange Polska) — hardcoded in monitor.py
    asns:
      - "5617"    # Orange Polska (reliable)
      - "5588"    # GTS / T-Mobile
      - "12912"   # T-Mobile PL / Era
      - "29314"   # Vectra
      - "21021"   # Multimedia Polska
  - code: DK
    name: Denmark
    flag: "🇩🇰"
    check_method: ripe_daily_single_asn
    monitor: true
    # Reliable ASN for the daily single-ASN check is hardcoded in
    # monitor.py RELIABLE_ASN (DK -> AS3292 TDC / Nuuday)
  - code: FR
    name: France
    flag: "🇫🇷"
    check_method: ripe_daily_single_asn
    monitor: true
  - code: AE
    name: UAE
    flag: "🇦🇪"
    check_method: ripe_daily_single_asn
    monitor: true
    # Block pages at CF 104.16.130.238/104.16.131.238 (NOT the real site)
  - code: "NO"
    name: Norway
    flag: "🇳🇴"
    check_method: ripe_daily_single_asn
    monitor: true
